services:
  _note:
    description: >
      This registry is used by ACP /services. Entries are marked implemented=true/false
      at runtime; ACP may also append services missing from this registry and emit
      warnings for any drift.

  phenotype_recommendation:
    endpoint: /flows/phenotype_recommendation
    mcp_tools:
      - phenotype_search
      - phenotype_prompt_bundle
    input:
      - study_intent
      - top_k
      - max_results
      - candidate_limit
    output:
      - recommendations
      - candidate_count
      - candidate_limit
    validation:
      - core.phenotype_recommendations filters to allowed cohortIds
      - user confirmation before any writes

  phenotype_improvements:
    endpoint: /flows/phenotype_improvements
    mcp_tools:
      - phenotype_improvements
    input:
      - protocol_text
      - cohort (single)
      - characterization_previews
    output:
      - phenotype_improvements
      - code_suggestion
    validation:
      - core.phenotype_improvements filters to allowed cohortIds
      - user confirmation before any writes

  concept_sets_review:
    endpoint: /flows/concept_sets_review
    mcp_tools:
      - propose_concept_set_diff
    input:
      - concept_set
      - study_intent
    output:
      - findings
      - patches
      - actions
    validation:
      - core.propose_concept_set_diff deterministic checks
      - user confirmation before any writes

  cohort_critique_general_design:
    endpoint: /flows/cohort_critique_general_design
    mcp_tools:
      - cohort_lint
    input:
      - cohort
    output:
      - findings
      - patches
      - actions
    validation:
      - core.cohort_lint deterministic checks
      - user confirmation before any writes

  phenotype_validation_review:
    endpoint: /flows/phenotype_validation_review
    mcp_tools:
      - keeper_prompt_bundle
      - keeper_sanitize_row
      - keeper_build_prompt
      - keeper_parse_response
    input:
      - keeper_row (single patient)
      - disease_name
    output:
      - label
      - rationale
    validation:
      - PHI/PII fail-closed sanitation (HIPAA 18)
      - output label constrained to yes/no/unknown

  phenotype_recommendation_advice:
    endpoint: /flows/phenotype_recommendation_advice
    mcp_tools:
      - phenotype_recommendation_advice
    input:
      - study_intent
    output:
      - advice
      - next_steps
      - questions
    validation:
      - core.phenotype_recommendation_advice schema validation

  phenotype_intent_split:
    endpoint: /flows/phenotype_intent_split
    mcp_tools:
      - phenotype_intent_split
    input:
      - study_intent
    output:
      - target_statement
      - outcome_statement
      - rationale
      - questions
    validation:
      - core.phenotype_intent_split schema validation

  finngen_cohort_operations:
    endpoint: /flows/finngen/cohort-operations
    description: Optional FINNGEN CohortOperations2 cohort compilation and inspection workspace.
    mcp_tools:
      - finngen_cohort_operations_catalog
    input:
      - cohort_definition
      - source_key
      - execution_mode
    output:
      - compile_summary
      - inclusion_statistics
      - generated_artifacts
    validation:
      - registration gated by FINNGEN_COHORT_OPERATIONS_ENABLED
      - writes require explicit confirmation before execution tools are added
    ui_hints:
      title: Cohort Operations
      summary: Compile cohorts, inspect inclusion criteria, and review attrition with a visual workbench.
      accent: rose
      repository: https://github.com/FINNGEN/CohortOperations2
      workspace: cohort-workbench
      visualizations:
        - Attrition funnel
        - Criteria timeline
        - Overlap matrix
        - SQL artifact panel

  finngen_co2_analysis:
    endpoint: /flows/finngen/co2-analysis
    description: Optional FINNGEN CO2AnalysisModules analysis catalog and execution surface.
    mcp_tools:
      - finngen_co2_analysis_catalog
    input:
      - analysis_module
      - cohort_bundle
      - output_format
    output:
      - execution_summary
      - model_artifacts
      - visualization_payloads
    validation:
      - registration gated by FINNGEN_CO2_ANALYSIS_ENABLED
      - job execution remains opt-in and source-scoped
    ui_hints:
      title: CO2 Analysis Modules
      summary: Explore module families, stage analyses, and review outcome visuals from a module gallery.
      accent: amber
      repository: https://github.com/FINNGEN/CO2AnalysisModules
      workspace: analysis-gallery
      visualizations:
        - Forest plot
        - Heatmap matrix
        - Execution timeline
        - Covariate balance board

  finngen_hades_extras:
    endpoint: /flows/finngen/hades-extras
    description: Optional FINNGEN HadesExtras artifact generation and SQL rendering helpers.
    mcp_tools:
      - finngen_hades_extras_catalog
    input:
      - package_spec
      - sql_template
      - render_target
    output:
      - render_summary
      - package_manifest
      - artifact_diff
    validation:
      - registration gated by FINNGEN_HADES_EXTRAS_ENABLED
      - generated artifacts remain reviewable before any publish step
    ui_hints:
      title: HADES Extras
      summary: Render SQL, compare generated packages, and inspect artifact pipelines before release.
      accent: cyan
      repository: https://github.com/FINNGEN/HadesExtras
      workspace: artifact-studio
      visualizations:
        - SQL diff view
        - Artifact pipeline
        - Manifest dependency graph
        - Output gallery

  finngen_romopapi:
    endpoint: /flows/finngen/romopapi
    description: Optional FINNGEN ROMOPAPI metadata and OMOP query exploration service.
    mcp_tools:
      - finngen_romopapi_catalog
    input:
      - query_template
      - schema_scope
      - projection
    output:
      - metadata_summary
      - lineage_trace
      - result_profile
    validation:
      - registration gated by FINNGEN_ROMOPAPI_ENABLED
      - initial surface is read-only metadata and query planning
    ui_hints:
      title: ROMOPAPI
      summary: Browse schema metadata, draft OMOP queries, and inspect lineage before execution.
      accent: indigo
      repository: https://github.com/FINNGEN/ROMOPAPI
      workspace: omop-query-canvas
      visualizations:
        - Schema graph
        - Query canvas
        - Lineage panel
        - Result profile grid

  etl_mapping_workbench:
    endpoint: /flows/etl-mapping
    description: Visual source-to-CDM mapping with concept matching and vocabulary lookup generation.
    mcp_tools:
      - etl_mapping_workbench_catalog
    input:
      - source_key
      - scan_report
      - mapping_config
      - source_codes_csv
      - vocabulary_filters
    output:
      - mapping_summary
      - concept_matches
      - lookup_sql
      - etl_archive
    validation:
      - registration gated by ETL_MAPPING_WORKBENCH_ENABLED
      - writes require explicit confirmation before execution tools are added
    ui_hints:
      title: Aqueduct
      summary: Design and validate ETL mappings from source data to OMOP CDM
      accent: teal
      repository: null
      workspace: etl-workbench
